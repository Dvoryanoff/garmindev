services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garmin-dashboard-app
    environment:
      GARMIN_HOST: 0.0.0.0
      GARMIN_PORT: 8000
      GARMIN_OPEN_BROWSER: 0
      GARMIN_RESOURCES_DIR: /app/resources
      GARMIN_UPLOAD_DIR: /app/uploads
      GARMIN_CACHE_FILE: /app/runtime/garmin_swim_fit_cache.pkl
      GARMIN_DETAIL_CSV: /app/runtime/garmin_swim_intervals_details.csv
      GARMIN_SUMMARY_CSV: /app/runtime/garmin_swim_intervals_summary.csv
      GARMIN_MONTHLY_HISTORY_DIR: /app/monthly_history
      GARMIN_MAX_WORKERS: ${GARMIN_MAX_WORKERS:-4}
      GARMIN_BATCH_SIZE: ${GARMIN_BATCH_SIZE:-100}
      DATABASE_URL: postgresql://${GARMIN_POSTGRES_USER:-garmin}:${GARMIN_POSTGRES_PASSWORD:-garmin}@db:5432/${GARMIN_POSTGRES_DB:-garmin_dashboard}
    volumes:
      - ./resources:/app/resources
      - garmin_runtime:/app/runtime
      - garmin_monthly_history:/app/monthly_history
      - garmin_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/healthz', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: garmin-dashboard-frontend
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${GARMIN_FRONTEND_PORT:-8080}:80"

  db:
    image: postgres:16-alpine
    container_name: garmin-dashboard-db
    environment:
      POSTGRES_DB: ${GARMIN_POSTGRES_DB:-garmin_dashboard}
      POSTGRES_USER: ${GARMIN_POSTGRES_USER:-garmin}
      POSTGRES_PASSWORD: ${GARMIN_POSTGRES_PASSWORD:-garmin}
    volumes:
      - garmin_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GARMIN_POSTGRES_USER:-garmin} -d ${GARMIN_POSTGRES_DB:-garmin_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  garmin_postgres:
  garmin_runtime:
  garmin_monthly_history:
  garmin_uploads:
